@startuml test_pyramid
skinparam dpi 150
skinparam backgroundColor #11141A
skinparam shadowing false
skinparam roundCorner 6

skinparam defaultFontName "DejaVu Sans"
skinparam defaultFontSize 14
skinparam defaultFontColor #E6E8EC
skinparam defaultTextAlignment center


skinparam ArrowColor #F0A456
skinparam ArrowFontColor #E6E8EC
skinparam ArrowThickness 1.5

skinparam node {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam component {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam rectangle {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam package {
  BackgroundColor #11141A
  BorderColor #F0A456
  FontColor #F0A456
}

skinparam folder {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam frame {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam database {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam queue {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam cloud {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam actor {
  BackgroundColor #161A22
  BorderColor #F0A456
  FontColor #E6E8EC
}

skinparam usecase {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam class {
  BackgroundColor #161A22
  BorderColor #3D424E
  HeaderBackgroundColor #1B202A
  ArrowColor #F0A456
  FontColor #E6E8EC
  AttributeFontColor #A6ADBB
  StereotypeFontColor #F0A456
}

skinparam object {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam sequence {
  ParticipantBackgroundColor #161A22
  ParticipantBorderColor #3D424E
  ParticipantFontColor #E6E8EC
  ActorBackgroundColor #161A22
  ActorBorderColor #F0A456
  ActorFontColor #E6E8EC
  LifeLineBorderColor #3D424E
  LifeLineBackgroundColor #1B202A
  ArrowColor #F0A456
  ArrowFontColor #E6E8EC
  GroupBackgroundColor #1B202A
  GroupBorderColor #3D424E
  GroupFontColor #A6ADBB
  GroupHeaderFontColor #F0A456
  BoxBackgroundColor #11141A
  BoxBorderColor #F0A456
  BoxFontColor #F0A456
  DividerBackgroundColor #1B202A
  DividerBorderColor #3D424E
  DividerFontColor #A6ADBB
  ReferenceBackgroundColor #161A22
  ReferenceBorderColor #3D424E
  ReferenceFontColor #E6E8EC
  ReferenceHeaderBackgroundColor #1B202A
  StereotypeFontColor #F0A456
}

skinparam state {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  StartColor #F0A456
  EndColor #F0A456
  ArrowColor #F0A456
  AttributeFontColor #A6ADBB
}

skinparam activity {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  ArrowColor #F0A456
  StartColor #F0A456
  EndColor #F0A456
  BarColor #F0A456
  DiamondBackgroundColor #1B202A
  DiamondBorderColor #3D424E
  DiamondFontColor #E6E8EC
}

skinparam note {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam title {
  FontColor #E6E8EC
  FontSize 18
}

skinparam legend {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam caption {
  FontColor #A6ADBB
}

skinparam stereotype {
  CBackgroundColor #1B202A
  CBorderColor #F0A456
  ABackgroundColor #1B202A
  ABorderColor #F0A456
  IBackgroundColor #1B202A
  IBorderColor #F0A456
  EBackgroundColor #1B202A
  EBorderColor #F0A456
}

title Testovací pyramida pro DDD aplikaci

skinparam rectangle {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

rectangle "End-to-end (E2E)\n5 % testů\n— jen kritické flow\n— Symfony Panther / Cypress" as e2e #260000
rectangle "Integration (Kernel)\n15 % testů\n— Symfony KernelTestCase\n— Doctrine in-memory / SQLite\n— Command + Query handlers" as int #1B202A
rectangle "Component (BC)\n30 % testů\n— modul/BC isolated\n— in-memory repository\n— Application Services" as comp #1B202A
rectangle "Unit\n50 % testů\n— čistý PHPUnit\n— Aggregate, VO, Domain Service\n— bez frameworku, bez DB\n— rychlé (ms)" as unit #102B00

unit -[#F0A456]up-> comp
comp -[#F0A456]up-> int
int -[#F0A456]up-> e2e

note right of unit
  **Doménová vrstva** v DDD je čistý PHP.
  Test invariantu agregátu = unit test.
  Žádný EntityManager, žádný Symfony container.
end note

note right of comp
  **Agregát + Application Service** v BC.
  In-memory repository pro test koordinace.
  Validuje use case, ne integraci s frameworkem.
end note

note right of int
  **Skutečný kontejner, skutečná DB.**
  Kontroluje, že Doctrine mapping funguje,
  unique constraint vyhází správnou výjimku,
  outbox uloží event ve stejné transakci.
end note

note right of e2e
  Drahé (provoz prohlížeče, full stack).
  Pokrývají JEN business-critical scénáře:
  „registrace → přihlášení", „checkout → platba".
end note

@enduml

