-system, sans-serif" font-size="21.875" lengthAdjust="spacingAndGlyphs" textLength="451.5625" x="414.8438" y="609.758">In-memory repository pro test koordinace.</text><text fill="#A6ADBB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21.875" lengthAdjust="spacingAndGlyphs" textLength="504.6875" x="414.8438" y="635.2219">Validuje use case, ne integraci s frameworkem.</text><path d="M444.5313,296.8018 L444.5313,344.458 L389.9688,350.708 L444.5313,356.958 L444.5313,404.9072 A4.6875,4.6875 0 0 0 449.2188,409.5947 L930.4688,409.5947 A4.6875,4.6875 0 0 0 935.1563,404.9072 L935.1563,307.7393 L919.5313,292.1143 L449.2188,292.1143 A4.6875,4.6875 0 0 0 444.5313,296.8018 " fill="#1B202A" style="stroke: #3D424E; stroke-width: 1.5625;"/><path d="M919.5313,292.1143 L919.5313,305.3955 A2.3438,2.3438 0 0 0 921.875,307.7393 L935.1563,307.7393 L919.5313,292.1143 " fill="#1B202A" style="stroke: #3D424E; stroke-width: 1.5625;"/><text fill="#A6ADBB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21.875" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="417.1875" x="453.9063" y="320.2316">Skutečný kontejner, skutečná DB.</text><text fill="#A6ADBB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21.875" lengthAdjust="spacingAndGlyphs" textLength="440.625" x="453.9063" y="345.6955">Kontroluje, že Doctrine mapping funguje,</text><text fill="#A6ADBB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21.875" lengthAdjust="spacingAndGlyphs" textLength="457.8125" x="453.9063" y="371.1594">unique constraint vyhází správnou výjimku,</text><text fill="#A6ADBB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21.875" lengthAdjust="spacingAndGlyphs" textLength="412.5" x="453.9063" y="396.6232">outbox uloží event ve stejné transakci.</text><path d="M435.9375,70.2393 L435.9375,105.3955 L381.5781,111.6455 L435.93