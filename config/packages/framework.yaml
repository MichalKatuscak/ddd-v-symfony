# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    assets:
        version: '%env(APP_VERSION)%'
    #csrf_protection: true

    # Bez session — web je čistě obsahový, žádné session by způsobily
    # Cache-Control: no-cache, private a tím znemožnily edge cache.

    #esi: true
    #fragments: true

    # Nastavení pro chybové stránky
    error_controller: error_controller

when@test:
    framework:
        test: true
