name: Deploy to FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        env:
          APP_ENV: prod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies and build assets
        run: npm ci && npx vite build

      - name: Set asset version from git commit
        run: echo "APP_VERSION=$(git rev-parse --short HEAD)" > .env.prod

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /www/subdom/ddd-v-symfony/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            _hidden/**
            screenshots/**
            docs/**
            tests/**
            assets/**
            node_modules/**
            vite.config.js
            package.json
            package-lock.json
            .env.local
            .env.*.local
            CLAUDE.md
