@startuml
skinparam dpi 150
skinparam backgroundColor #11141A
skinparam shadowing false
skinparam roundCorner 6

skinparam defaultFontName "DejaVu Sans"
skinparam defaultFontSize 14
skinparam defaultFontColor #E6E8EC
skinparam defaultTextAlignment center


skinparam ArrowColor #F0A456
skinparam ArrowFontColor #E6E8EC
skinparam ArrowThickness 1.5

skinparam node {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam component {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam rectangle {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam package {
  BackgroundColor #11141A
  BorderColor #F0A456
  FontColor #F0A456
}

skinparam folder {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam frame {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam database {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam queue {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam cloud {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam actor {
  BackgroundColor #161A22
  BorderColor #F0A456
  FontColor #E6E8EC
}

skinparam usecase {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam class {
  BackgroundColor #161A22
  BorderColor #3D424E
  HeaderBackgroundColor #1B202A
  ArrowColor #F0A456
  FontColor #E6E8EC
  AttributeFontColor #A6ADBB
  StereotypeFontColor #F0A456
}

skinparam object {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam sequence {
  ParticipantBackgroundColor #161A22
  ParticipantBorderColor #3D424E
  ParticipantFontColor #E6E8EC
  ActorBackgroundColor #161A22
  ActorBorderColor #F0A456
  ActorFontColor #E6E8EC
  LifeLineBorderColor #3D424E
  LifeLineBackgroundColor #1B202A
  ArrowColor #F0A456
  ArrowFontColor #E6E8EC
  GroupBackgroundColor #1B202A
  GroupBorderColor #3D424E
  GroupFontColor #A6ADBB
  GroupHeaderFontColor #F0A456
  BoxBackgroundColor #11141A
  BoxBorderColor #F0A456
  BoxFontColor #F0A456
  DividerBackgroundColor #1B202A
  DividerBorderColor #3D424E
  DividerFontColor #A6ADBB
  ReferenceBackgroundColor #161A22
  ReferenceBorderColor #3D424E
  ReferenceFontColor #E6E8EC
  ReferenceHeaderBackgroundColor #1B202A
  StereotypeFontColor #F0A456
}

skinparam state {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  StartColor #F0A456
  EndColor #F0A456
  ArrowColor #F0A456
  AttributeFontColor #A6ADBB
}

skinparam activity {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  ArrowColor #F0A456
  StartColor #F0A456
  EndColor #F0A456
  BarColor #F0A456
  DiamondBackgroundColor #1B202A
  DiamondBorderColor #3D424E
  DiamondFontColor #E6E8EC
}

skinparam note {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam title {
  FontColor #E6E8EC
  FontSize 18
}

skinparam legend {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam caption {
  FontColor #A6ADBB
}

skinparam stereotype {
  CBackgroundColor #1B202A
  CBorderColor #F0A456
  ABackgroundColor #1B202A
  ABorderColor #F0A456
  IBackgroundColor #1B202A
  IBorderColor #F0A456
  EBackgroundColor #1B202A
  EBorderColor #F0A456
}

title Context Map: 5 Bounded Contexts a všech 8 typů vztahů

rectangle "Catalog BC" as catalog #F0A456
rectangle "Pricing BC" as pricing #F0A456
rectangle "Ordering BC" as ordering
rectangle "Billing BC" as billing
rectangle "Identity BC\n(Auth0)" as identity #555555

catalog <-> pricing : <b>Partnership</b>\n(společný release)

note bottom of pricing
  <b>Shared Kernel:</b>
  Money, Currency
end note

catalog -> ordering : <b>Customer/Supplier</b>\nproduktové ID + cena

ordering -down-> billing : <b>ACL</b>\nOrderPlaced -> Invoice
note right of billing
  Billing = legacy
  ACL chrání Ordering model
end note

billing -up-> ordering : <i>(Conformist v opačném směru\npokud chybí ACL)</i>

identity -[#F0A456]-> ordering : <b>Open Host Service</b>\nREST + JWT (PL)
identity -[#F0A456]-> billing : <b>Open Host Service</b>

rectangle "Marketing BC\n(SendGrid)" as marketing #555555
note left of marketing
  <b>Separate Ways:</b>
  žádná integrace,
  vlastní mailing list
end note

@enduml

