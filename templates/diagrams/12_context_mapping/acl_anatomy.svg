  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
}

skinparam sequence {
  ParticipantBackgroundColor #161A22
  ParticipantBorderColor #3D424E
  ParticipantFontColor #E6E8EC
  ActorBackgroundColor #161A22
  ActorBorderColor #F0A456
  ActorFontColor #E6E8EC
  LifeLineBorderColor #3D424E
  LifeLineBackgroundColor #1B202A
  ArrowColor #F0A456
  ArrowFontColor #E6E8EC
  GroupBackgroundColor #1B202A
  GroupBorderColor #3D424E
  GroupFontColor #A6ADBB
  GroupHeaderFontColor #F0A456
  BoxBackgroundColor #11141A
  BoxBorderColor #F0A456
  BoxFontColor #F0A456
  DividerBackgroundColor #1B202A
  DividerBorderColor #3D424E
  DividerFontColor #A6ADBB
  ReferenceBackgroundColor #161A22
  ReferenceBorderColor #3D424E
  ReferenceFontColor #E6E8EC
  ReferenceHeaderBackgroundColor #1B202A
  StereotypeFontColor #F0A456
}

skinparam state {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  StartColor #F0A456
  EndColor #F0A456
  ArrowColor #F0A456
  AttributeFontColor #A6ADBB
}

skinparam activity {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #E6E8EC
  ArrowColor #F0A456
  StartColor #F0A456
  EndColor #F0A456
  BarColor #F0A456
  DiamondBackgroundColor #1B202A
  DiamondBorderColor #3D424E
  DiamondFontColor #E6E8EC
}

skinparam note {
  BackgroundColor #1B202A
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam title {
  FontColor #E6E8EC
  FontSize 18
}

skinparam legend {
  BackgroundColor #161A22
  BorderColor #3D424E
  FontColor #A6ADBB
}

skinparam caption {
  FontColor #A6ADBB
}

skinparam stereotype {
  CBackgroundColor #1B202A
  CBorderColor #F0A456
  ABackgroundColor #1B202A
  ABorderColor #F0A456
  IBackgroundColor #1B202A
  IBorderColor #F0A456
  EBackgroundColor #1B202A
  EBorderColor #F0A456
}

title Anti-Corruption Layer: anatomie překladu Legacy -> Domain

participant "Legacy Billing\n(SOAP)" as legacy
box "Ordering BC" #11141A
    participant "ACL\nLegacyBillingTranslator" as acl
    participant "Order\nAggregate" as order
end box

legacy -> acl : <i>InvoiceCreatedSoapResponse</i>\n{customerNumber, amountCents, ...}
note right of acl
  <b>3 odpovědnosti ACL:</b>
  1. Schema mapping (DTO -> VO)
  2. Concept translation (customerNumber -> CustomerId)
  3. Anti-corruption (filtrace neplatných stavů)
end note
acl -> acl : map(amountCents) -> Money(EUR, 100.00)
acl -> acl : map(customerNumber) -> CustomerId(uuid)
acl -> acl : if invalid -> throw IncomingMessageRejected
acl -> order : applyInvoicePaid(InvoicePaidEvent)
@enduml

