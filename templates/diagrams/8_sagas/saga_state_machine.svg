<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css"
     preserveAspectRatio="none"
     style="aspect-ratio:1.731" version="1.1" viewBox="0 0 900 520"
     zoomAndPan="magnify" font-family="Nunito, sans-serif" font-size="13">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b85ff"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#51cf66"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffa94d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="none"/>

  <!-- Start circle -->
  <circle cx="50" cy="100" r="12" fill="#8b85ff" stroke="#6c63ff" stroke-width="2"/>
  <circle cx="50" cy="100" r="6" fill="#1a1a2e"/>

  <!-- Arrow: Start -> AwaitingPayment -->
  <line x1="62" y1="100" x2="118" y2="100" stroke="#8b85ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="90" y="90" text-anchor="middle" fill="#a0a0c0" font-size="11">OrderPlaced</text>

  <!-- State: AwaitingPayment -->
  <rect x="120" y="75" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="210" y="105" text-anchor="middle" fill="#e0e0e0" font-weight="600">AwaitingPayment</text>

  <!-- Arrow: AwaitingPayment -> AwaitingStockReservation -->
  <line x1="300" y1="100" x2="378" y2="100" stroke="#8b85ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="339" y="90" text-anchor="middle" fill="#51cf66" font-size="11">PaymentSucceeded</text>

  <!-- State: AwaitingStockReservation -->
  <rect x="380" y="75" width="210" height="50" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="485" y="105" text-anchor="middle" fill="#e0e0e0" font-weight="600">AwaitingStockReservation</text>

  <!-- Arrow: AwaitingStockReservation -> AwaitingShipment -->
  <line x1="590" y1="100" x2="648" y2="100" stroke="#8b85ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="619" y="90" text-anchor="middle" fill="#51cf66" font-size="11">StockReserved</text>

  <!-- State: AwaitingShipment -->
  <rect x="650" y="75" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <text x="740" y="105" text-anchor="middle" fill="#e0e0e0" font-weight="600">AwaitingShipment</text>

  <!-- Arrow: AwaitingShipment -> Completed -->
  <line x1="740" y1="125" x2="740" y2="228" stroke="#51cf66" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="755" y="180" fill="#51cf66" font-size="11">ShipmentCreated</text>

  <!-- State: Completed -->
  <rect x="650" y="230" width="180" height="50" rx="8" fill="#1a3a1a" stroke="#51cf66" stroke-width="2"/>
  <text x="740" y="260" text-anchor="middle" fill="#51cf66" font-weight="700">Completed</text>

  <!-- Arrow: AwaitingPayment -> Failed (down) -->
  <path d="M 210 125 L 210 310 L 298 310" stroke="#ff6b6b" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="160" y="220" fill="#ff6b6b" font-size="11">PaymentFailed</text>

  <!-- Arrow: AwaitingStockReservation -> Compensating (down) -->
  <line x1="485" y1="125" x2="485" y2="228" stroke="#ffa94d" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  <text x="410" y="180" fill="#ffa94d" font-size="11">StockReservation</text>
  <text x="410" y="195" fill="#ffa94d" font-size="11">Failed</text>

  <!-- State: Compensating -->
  <rect x="390" y="230" width="190" height="50" rx="8" fill="#2a1a0a" stroke="#ffa94d" stroke-width="2"/>
  <text x="485" y="260" text-anchor="middle" fill="#ffa94d" font-weight="600">Compensating</text>

  <!-- Arrow: Compensating -> Failed -->
  <line x1="390" y1="270" x2="328" y2="300" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead-red)"/>

  <!-- State: Failed -->
  <rect x="200" y="285" width="130" height="50" rx="8" fill="#2a0a0a" stroke="#ff6b6b" stroke-width="2"/>
  <text x="265" y="315" text-anchor="middle" fill="#ff6b6b" font-weight="700">Failed</text>

  <!-- Compensating note box -->
  <rect x="395" y="300" width="230" height="60" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="510" y="320" text-anchor="middle" fill="#a0a0c0" font-size="11" font-style="italic">Kompenzace:</text>
  <text x="510" y="338" text-anchor="middle" fill="#a0a0c0" font-size="11">RefundCustomer + CancelOrder</text>

  <!-- Legend -->
  <rect x="30" y="420" width="840" height="80" rx="8" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="445" fill="#a0a0c0" font-size="12" font-weight="600">Legenda:</text>
  <line x1="50" y1="465" x2="90" y2="465" stroke="#51cf66" stroke-width="2"/>
  <text x="95" y="469" fill="#a0a0c0" font-size="11">Uspesny prechod</text>
  <line x1="250" y1="465" x2="290" y2="465" stroke="#ff6b6b" stroke-width="2"/>
  <text x="295" y="469" fill="#a0a0c0" font-size="11">Selhani (business chyba)</text>
  <line x1="500" y1="465" x2="540" y2="465" stroke="#ffa94d" stroke-width="2"/>
  <text x="545" y="469" fill="#a0a0c0" font-size="11">Kompenzacni cesta</text>
  <text x="50" y="490" fill="#666" font-size="10">Kazdy stav odpovida jedne hodnote enum OrderSagaStatus. Prechody spousti domenove udalosti.</text>
</svg>
